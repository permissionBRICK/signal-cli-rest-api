name: Publish fork image + Home Assistant addon to GHCR

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: Image tag to use (in addition to "latest")
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  base-image:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repo owner
        id: owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Compute version
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=$(date +%Y.%m.%d)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi
      - name: Build & push base image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            BUILD_VERSION_ARG=${{ steps.meta.outputs.version }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/signal-cli-rest-api:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/signal-cli-rest-api:${{ steps.meta.outputs.version }}

  addon-images:
    runs-on: ubuntu-24.04
    needs: base-image
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha_arch: amd64
            docker_platform: linux/amd64
          - ha_arch: aarch64
            docker_platform: linux/arm64
          - ha_arch: armv7
            docker_platform: linux/arm/v7
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repo owner
        id: owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Read addon version from config.yaml
        id: addon
        run: |
          v=$(grep -E '^version:' signal-api/config.yaml | head -1 | sed -E 's/^version:\s*"?([^"]+)"?\s*$/\1/')
          echo "version=$v" >> $GITHUB_OUTPUT
      - name: Build & push addon image for ${{ matrix.ha_arch }}
        uses: docker/build-push-action@v6
        with:
          context: ./signal-api
          file: ./signal-api/Dockerfile
          platforms: ${{ matrix.docker_platform }}
          push: true
          build-args: |
            BUILD_FROM=ghcr.io/${{ steps.owner.outputs.owner }}/signal-cli-rest-api:${{ needs.base-image.outputs.version }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/signal-cli-rest-api-addon-${{ matrix.ha_arch }}:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/signal-cli-rest-api-addon-${{ matrix.ha_arch }}:${{ needs.base-image.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner }}/signal-cli-rest-api-addon-${{ matrix.ha_arch }}:${{ steps.addon.outputs.version }}
